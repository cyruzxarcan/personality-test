<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Persona - Ultimate Stability</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    
    <style>
        :root { --accent: #00f2ea; --hot-pink: #ff0050; }
        body { margin: 0; background: #000; font-family: sans-serif; overflow: hidden; color: white; }
        
        #video-container { position: relative; width: 100vw; height: 100vh; background: #111; }
        video { transform: scaleX(-1); width: 100%; height: 100%; object-fit: cover; }

        #start-overlay {
            position: absolute; inset: 0; background: #000; z-index: 200;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }

        #game-ui {
            position: absolute; width: 360px; pointer-events: none; z-index: 10;
            display: none; flex-direction: column; align-items: center;
            top: 20%; left: 50%; transform: translate(-50%, -50%);
        }

        .question-bubble {
            background: #fff; color: #000; padding: 20px; border-radius: 20px;
            font-weight: 800; font-size: 1.4rem; margin-bottom: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; width: 100%;
        }

        .options-row { display: flex; gap: 15px; width: 100%; justify-content: center; }

        .option {
            background: #fff; color: #000; padding: 15px; border-radius: 12px;
            font-weight: 700; flex: 1; text-align: center;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .selected-pop { transform: scale(1.4); background: var(--accent) !important; box-shadow: 0 0 30px var(--accent); }
        .hidden-option { opacity: 0; transform: scale(0.5); }

        #loading-screen, #result-screen {
            position: absolute; inset: 0; background: rgba(0,0,0,0.95);
            display: none; flex-direction: column; justify-content: center;
            align-items: center; text-align: center; z-index: 100;
        }

        .pulse { font-size: 2rem; font-weight: 900; color: var(--accent); animation: p 0.8s infinite alternate; }
        @keyframes p { from { opacity: 0.5; } to { opacity: 1; } }

        .btn {
            padding: 15px 40px; border-radius: 50px; border: none; 
            background: var(--hot-pink); color: white; font-weight: 800; 
            cursor: pointer; font-size: 1.1rem;
        }
    </style>
</head>
<body>

<div id="start-overlay">
    <h1 style="color:var(--accent)">AI Persona Game</h1>
    <p>Tilt your head to choose!</p>
    <button class="btn" id="init-btn">START CAMERA</button>
    <p id="error-log" style="color:red; margin-top:10px; font-size: 0.8rem;"></p>
</div>

<div id="video-container">
    <video id="input_video" playsinline></video>
    
    <div id="game-ui">
        <div class="question-bubble" id="q-text">Ready?</div>
        <div class="options-row">
            <div id="opt-left" class="option">Option A</div>
            <div id="opt-right" class="option">Option B</div>
        </div>
    </div>

    <div id="loading-screen"><div class="pulse">ANALYZING...</div></div>

    <div id="result-screen">
        <h1 id="res-title" style="color:var(--accent)">Result</h1>
        <p id="res-desc" style="font-size: 1.2rem; max-width: 80%;"></p>
        <button class="btn" onclick="location.reload()">PLAY AGAIN</button>
    </div>
</div>

<script>
    const videoElement = document.getElementById('input_video');
    const startOverlay = document.getElementById('start-overlay');
    const gameUI = document.getElementById('game-ui');
    const qText = document.getElementById('q-text');
    const optLeft = document.getElementById('opt-left');
    const optRight = document.getElementById('opt-right');
    const errorLog = document.getElementById('error-log');

    let currentQ = 0, score = 0, isLocked = false, isFinished = false;

    const questions = [
        { q: "Problem solving?", a: "Fast & Instinctive", b: "Slow & Methodical" },
        { q: "Communication?", a: "Direct / Blunt", b: "Kind / Friendly" },
        { q: "Energy?", a: "Solar Powered", b: "Battery Operated" },
        { q: "Brain Type?", a: "Visual Art", b: "Logic Code" }
    ];

    function onResults(results) {
        if (!results.multiFaceLandmarks?.[0] || isFinished) return;
        
        // Show UI once we actually have tracking
        if(gameUI.style.display !== 'flex') gameUI.style.display = 'flex';

        const landmarks = results.multiFaceLandmarks[0];
        const nose = landmarks[1];
        
        const x = (1 - nose.x) * window.innerWidth;
        const y = nose.y * window.innerHeight;
        gameUI.style.left = x + 'px';
        gameUI.style.top = (y - 250) + 'px';

        if (isLocked) return;

        const tilt = landmarks[33].y - landmarks[263].y;
        if (tilt > 0.08) triggerSelection('right');
        else if (tilt < -0.08) triggerSelection('left');
    }

    function triggerSelection(side) {
        isLocked = true;
        if (side === 'right') { score++; optRight.classList.add('selected-pop'); optLeft.classList.add('hidden-option'); }
        else { optLeft.classList.add('selected-pop'); optRight.classList.add('hidden-option'); }

        setTimeout(() => {
            currentQ++;
            if (currentQ < questions.length) {
                optLeft.classList.remove('selected-pop', 'hidden-option');
                optRight.classList.remove('selected-pop', 'hidden-option');
                updateQuestion();
                isLocked = false; 
            } else {
                showResults();
            }
        }, 1200);
    }

    function showResults() {
        isFinished = true;
        gameUI.style.display = 'none';
        document.getElementById('loading-screen').style.display = 'flex';
        setTimeout(() => {
            document.getElementById('loading-screen').style.display = 'none';
            document.getElementById('result-screen').style.display = 'flex';
            const title = document.getElementById('res-title');
            const desc = document.getElementById('res-desc');
            if (score <= 1) { title.innerText = "The Logic Architect"; desc.innerText = "Structured and sharp."; }
            else if (score <= 3) { title.innerText = "The Creative Spark"; desc.innerText = "A visionary neural network."; }
            else { title.innerText = "The Neural Maverick"; desc.innerText = "Pure, raw AI energy."; }
        }, 2000);
    }

    function updateQuestion() {
        qText.innerText = questions[currentQ].q;
        optLeft.innerText = questions[currentQ].a;
        optRight.innerText = questions[currentQ].b;
    }

    const faceMesh = new FaceMesh({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`});
    faceMesh.setOptions({ maxNumFaces: 1, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
    faceMesh.onResults(onResults);

    const camera = new Camera(videoElement, {
        onFrame: async () => { await faceMesh.send({image: videoElement}); },
        width: 1280, height: 720
    });

    document.getElementById('init-btn').onclick = () => {
        startOverlay.style.display = 'none';
        updateQuestion();
        camera.start().catch(err => {
            startOverlay.style.display = 'flex';
            errorLog.innerText = "Camera Error: " + err.message;
        });
    };
</script>
</body>
</html>
